input_select:
  boiler_duration:
    name: Boiler Duration
    options:
      - "15m"
      - "30m"
      - "45m"
      - "60m"
      - "75m"
      - "90m"
      - "105m"
      - "120m"
      - "135m"
      - "150m"
      - "165m"
      - "180m"
      - "195m"
      - "210m"
      - "225m"
      - "240m"
      - "No Timer"
    initial: "30m"
    icon: mdi:timer-outline

input_text:
  boiler_switch_entity:
    name: Boiler Switch Entity
    initial: switch.boiler
    max: 128
  boiler_active_entity:
    name: Boiler Active Entity
    initial: switch.boiler
    max: 128

timer:
  boiler_runtime:
    name: Boiler Runtime
    duration: "00:30:00"

script:
  boiler_turn_on_timed:
    alias: Boiler - Turn On Timed
    mode: restart
    sequence:
      - variables:
          boiler_target: >-
            {% if boiler_entity is defined and boiler_entity %}
              {{ boiler_entity }}
            {% else %}
              {% set configured = states('input_text.boiler_switch_entity') %}
              {{ configured if configured not in ['unknown', 'unavailable', ''] else 'switch.boiler' }}
            {% endif %}
          picked_option: "{{ duration_option if duration_option is defined else states('input_select.boiler_duration') }}"
          picked_minutes: >-
            {% set raw = picked_option | regex_replace(find='[^0-9]', replace='') %}
            {{ raw | int(30) }}
          resolved_duration: >-
            {% if duration is defined and duration %}
              {{ duration }}
            {% else %}
              {{ '%02d:%02d:00' | format((picked_minutes // 60) | int, (picked_minutes % 60) | int) }}
            {% endif %}
      - action: homeassistant.turn_on
        target:
          entity_id: "{{ boiler_target }}"
      - action: input_text.set_value
        target:
          entity_id: input_text.boiler_active_entity
        data:
          value: "{{ boiler_target }}"
      - action: timer.start
        target:
          entity_id: timer.boiler_runtime
        data:
          duration: "{{ resolved_duration }}"

  boiler_turn_on_continuous:
    alias: Boiler - Turn On Continuous
    mode: single
    sequence:
      - variables:
          boiler_target: >-
            {% if boiler_entity is defined and boiler_entity %}
              {{ boiler_entity }}
            {% else %}
              {% set configured = states('input_text.boiler_switch_entity') %}
              {{ configured if configured not in ['unknown', 'unavailable', ''] else 'switch.boiler' }}
            {% endif %}
      - action: timer.cancel
        target:
          entity_id: timer.boiler_runtime
      - action: homeassistant.turn_on
        target:
          entity_id: "{{ boiler_target }}"
      - action: input_text.set_value
        target:
          entity_id: input_text.boiler_active_entity
        data:
          value: "{{ boiler_target }}"

  boiler_turn_off:
    alias: Boiler - Turn Off
    mode: single
    sequence:
      - variables:
          boiler_target: >-
            {% if boiler_entity is defined and boiler_entity %}
              {{ boiler_entity }}
            {% else %}
              {% set active = states('input_text.boiler_active_entity') %}
              {% if active not in ['unknown', 'unavailable', ''] %}
                {{ active }}
              {% else %}
                {% set configured = states('input_text.boiler_switch_entity') %}
                {{ configured if configured not in ['unknown', 'unavailable', ''] else 'switch.boiler' }}
              {% endif %}
            {% endif %}
      - action: homeassistant.turn_off
        target:
          entity_id: "{{ boiler_target }}"
      - action: timer.cancel
        target:
          entity_id: timer.boiler_runtime
      - action: input_text.set_value
        target:
          entity_id: input_text.boiler_active_entity
        data:
          value: ""

automation:
  - id: boiler_turn_off_on_timer_finished
    alias: Boiler - Turn Off On Timer Finished
    mode: single
    trigger:
      - platform: event
        event_type: timer.finished
        event_data:
          entity_id: timer.boiler_runtime
    action:
      - action: script.turn_on
        target:
          entity_id: script.boiler_turn_off

  - id: boiler_cancel_timer_when_manually_off
    alias: Boiler - Cancel Timer On Manual Off
    mode: single
    trigger:
      - platform: event
        event_type: state_changed
    condition:
      - condition: template
        value_template: >-
          {% set active = states('input_text.boiler_active_entity') %}
          {% set configured = states('input_text.boiler_switch_entity') %}
          {% if active not in ['unknown', 'unavailable', ''] %}
            {% set target = active %}
          {% else %}
            {% set target = configured if configured not in ['unknown', 'unavailable', ''] else 'switch.boiler' %}
          {% endif %}
          {% set old_state = trigger.event.data.old_state %}
          {% set new_state = trigger.event.data.new_state %}
          {{
            trigger.event.data.entity_id == target
            and old_state is not none
            and new_state is not none
            and old_state.state == 'on'
            and new_state.state == 'off'
            and is_state('timer.boiler_runtime', 'active')
          }}
    action:
      - action: timer.cancel
        target:
          entity_id: timer.boiler_runtime
