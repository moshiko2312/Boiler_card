name: Release HACS Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify frontend mirror is in sync
        run: python3 scripts/sync_frontend.py --check

      - name: Build HACS package zip
        run: python3 scripts/package_hacs.py --clean

      - name: Upload zip to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/boiler_manager_hacs.zip
          generate_release_notes: true
